<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iM뱅크 UX Writing Bot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --im-blue: #005BAC; --im-blue-light: #E6F0F9;
    --gray-50: #F8F9FA; --gray-100: #F1F3F5; --gray-200: #E9ECEF;
    --gray-300: #DEE2E6; --gray-500: #ADB5BD; --gray-700: #495057; --gray-900: #212529;
    --border: 1px solid #E2E8F0; --radius: 12px; --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(0,91,172,0.08);
  }
  body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F4F7FB; color: var(--gray-900); min-height: 100vh; display: flex; flex-direction: column; }
  header { background: var(--im-blue); color: white; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,91,172,0.2); }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo-badge { background: white; color: var(--im-blue); font-weight: 700; font-size: 13px; padding: 4px 10px; border-radius: 6px; }
  header h1 { font-size: 16px; font-weight: 500; opacity: 0.95; }
  .header-link { background: rgba(255,255,255,0.15); color: white; text-decoration: none; font-size: 12px; padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.3); white-space: nowrap; }
  .header-link:hover { background: rgba(255,255,255,0.25); }
  .main-container { flex: 1; display: flex; flex-direction: column; max-width: 760px; width: 100%; margin: 0 auto; }
  .chat-area { flex: 1; padding: 24px 16px 0; display: flex; flex-direction: column; gap: 16px; min-height: calc(100vh - 56px - 130px); }
  .welcome-card { background: white; border: var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
  .welcome-title { font-size: 20px; font-weight: 700; color: var(--im-blue); margin-bottom: 6px; }
  .welcome-desc { font-size: 14px; color: var(--gray-700); line-height: 1.6; margin-bottom: 18px; }
  .quick-tags-label { font-size: 12px; color: var(--gray-500); margin-bottom: 8px; font-weight: 500; }
  .quick-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag { background: var(--im-blue-light); color: var(--im-blue); font-size: 13px; padding: 6px 14px; border-radius: 20px; cursor: pointer; border: 1px solid #C8DCF0; transition: all 0.15s; font-weight: 500; }
  .tag:hover { background: var(--im-blue); color: white; border-color: var(--im-blue); }
  .message-row { display: flex; gap: 10px; align-items: flex-start; }
  .message-row.user { flex-direction: row-reverse; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .avatar.bot { background: var(--im-blue); color: white; font-size: 11px; }
  .avatar.user-av { background: var(--gray-200); color: var(--gray-700); font-size: 12px; }
  .bubble { max-width: 86%; padding: 14px 16px; border-radius: var(--radius); font-size: 14px; line-height: 1.7; }
  .bubble.bot { background: white; border: var(--border); box-shadow: var(--shadow); color: var(--gray-900); border-top-left-radius: 4px; }
  .bubble.user { background: var(--im-blue); color: white; border-top-right-radius: 4px; }
  .bubble.bot strong { font-weight: 600; color: var(--im-blue); }
  .bubble.bot h3 { font-size: 13px; font-weight: 700; color: var(--im-blue); margin: 14px 0 6px; }
  .bubble.bot ul { padding-left: 18px; margin: 6px 0; }
  .bubble.bot ul li { margin-bottom: 4px; }
  .bubble.bot p { margin-bottom: 8px; }
  .bubble.bot p:last-child { margin-bottom: 0; }
  .recommend-box { background: var(--im-blue-light); border: 1px solid #C8DCF0; border-radius: var(--radius-sm); padding: 12px 14px; margin: 10px 0; }
  .recommend-label { font-size: 11px; color: var(--im-blue); font-weight: 700; margin-bottom: 4px; }
  .recommend-text { font-size: 15px; font-weight: 700; color: var(--gray-900); }
  .alt-box { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: var(--radius-sm); padding: 10px 14px; margin-top: 6px; }
  .alt-label { font-size: 11px; color: var(--gray-500); font-weight: 700; margin-bottom: 3px; }
  .alt-text { font-size: 14px; color: var(--gray-700); font-weight: 500; }
  .case-section { margin-top: 12px; border-top: 1px solid var(--gray-200); padding-top: 12px; }
  .case-section-title { font-size: 12px; color: var(--gray-500); font-weight: 600; margin-bottom: 8px; }
  .case-item { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; padding: 8px 10px; background: var(--gray-50); border-radius: var(--radius-sm); border: 1px solid var(--gray-200); }
  .case-bank { font-size: 11px; font-weight: 700; color: white; background: var(--gray-500); padding: 2px 7px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
  .case-content { font-size: 13px; color: var(--gray-700); line-height: 1.5; }
  a.figma-link { display: inline-flex; align-items: center; gap: 6px; color: var(--im-blue); text-decoration: none; font-size: 13px; font-weight: 500; padding: 8px 14px; background: var(--im-blue-light); border-radius: var(--radius-sm); border: 1px solid #C8DCF0; margin-top: 10px; }
  a.figma-link:hover { background: var(--im-blue); color: white; }
  .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 14px 16px; background: white; border: var(--border); border-radius: var(--radius); border-top-left-radius: 4px; width: fit-content; box-shadow: var(--shadow); }
  .dot { width: 7px; height: 7px; background: var(--gray-300); border-radius: 50%; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform:translateY(0); background:var(--gray-300); } 30% { transform:translateY(-6px); background:var(--im-blue); } }
  .input-area { position: sticky; bottom: 0; background: #F4F7FB; padding: 12px 16px 20px; border-top: var(--border); }
  .input-wrap { display: flex; gap: 10px; background: white; border: 1.5px solid var(--gray-200); border-radius: var(--radius); padding: 10px 14px; transition: border-color 0.2s; box-shadow: var(--shadow); }
  .input-wrap:focus-within { border-color: var(--im-blue); box-shadow: 0 0 0 3px rgba(0,91,172,0.1); }
  #userInput { flex: 1; border: none; outline: none; font-size: 14px; color: var(--gray-900); background: transparent; font-family: inherit; resize: none; min-height: 20px; max-height: 120px; line-height: 1.5; }
  #userInput::placeholder { color: var(--gray-500); }
  .send-btn { background: var(--im-blue); color: white; border: none; border-radius: var(--radius-sm); width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; align-self: flex-end; transition: background 0.15s; }
  .send-btn:hover { background: #004A91; }
  .send-btn:disabled { background: var(--gray-300); cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; }
  .hint-text { text-align: center; font-size: 11px; color: var(--gray-500); margin-top: 8px; }
  @media (max-width: 480px) { .bubble { max-width: 92%; } header h1 { font-size: 14px; } .header-link { display: none; } }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="logo-badge">iM뱅크</div>
    <h1>UX Writing Bot</h1>
  </div>
  <a class="header-link" href="https://www.figma.com/design/XJTKvH2kJQg0cuf4Gg8DRI/UI-Guide?node-id=176-14178&t=Kgl4nVum9LJWVH5c-1" target="_blank">📐 가이드 문서 열기</a>
</header>

<div class="main-container">
  <div class="chat-area" id="chatArea">
    <div class="welcome-card">
      <div class="welcome-title">안녕하세요! iM뱅크 UX Writing Bot이에요 👋</div>
      <div class="welcome-desc">iM뱅크 UX Writing 가이드 기준으로 UI 문구, 컴포넌트 추천, 카피를 도와드립니다.<br>단어 하나만 입력해도 맥락을 파악해서 바로 답변드려요.</div>

        <div class="tag" onclick="sendQuick('에러 메시지')">에러 메시지</div>
        <div class="tag" onclick="sendQuick('바텀시트 vs 모달')">바텀시트 vs 모달</div>
        <div class="tag" onclick="sendQuick('empty state')">Empty State</div>
        <div class="tag" onclick="sendQuick('로딩')">로딩 문구</div>
        <div class="tag" onclick="sendQuick('iM스마트통장 배너 문구')">배너 문구</div>
        <div class="tag" onclick="sendQuick('가이드 문서 링크')">가이드 문서</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="userInput" placeholder="단어만 입력해도 돼요. 예: 에러, 배너, 로딩, 바텀시트..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="handleSend()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
    <div class="hint-text">iM뱅크 UX 가이드 기반 · 가이드에 없는 내용은 없다고 안내드려요</div>
  </div>
</div>

<script>
const FIGMA_URL = "https://www.figma.com/design/XJTKvH2kJQg0cuf4Gg8DRI/UI-Guide?node-id=176-14178&t=Kgl4nVum9LJWVH5c-1";

const SYSTEM_PROMPT = `당신은 iM뱅크 UX Writing 가이드 전문가 봇입니다.

━━━━━━━━━━━━━━━━━━━━━━━━━━━━
[핵심 행동 원칙]
━━━━━━━━━━━━━━━━━━━━━━━━━━━━
- 질문이 단어 하나여도, 오타가 있어도, 짧아도 맥락 파악 후 즉시 답변
- 추가 설명 요구 없이 가능한 범위에서 바로 핵심을 답한다
- 추천 문구 먼저, 원칙은 간결하게
- 서론/마무리 멘트 생략, 바로 핵심부터
- 문구 생성 시 반드시 아래 [톤·어투 기준]과 [용어 대치 사전]을 적용한다
- 가이드에 없는 항목(배너, CTA, 완료, 토스트, 타이틀 일반 등)은 답변 말미에 "※ 이 항목은 공식 가이드에 포함되지 않은 내용입니다. 가이드의 톤·어투 기준을 적용해 제안했습니다."라고 반드시 명시한다
- 용어 교정 요청 시: 대치어를 먼저 제시하고 이유를 한 줄로 설명한다
- 문구 안에 [용어 대치 사전]의 기존어가 포함된 경우 자동으로 대치어로 교체한다

━━━━━━━━━━━━━━━━━━━━━━━━━━━━
[톤·어투 기준] ← 모든 문구 생성에 적용
━━━━━━━━━━━━━━━━━━━━━━━━━━━━
- 친절하고 명확한 구어체 (예: "~해주세요", "~됐어요", "~해보세요")
- 원인 나열보다 해결 행동 중심
- 기술 용어·시스템 코드 사용 금지
- 부정 표현 지양, 긍정·행동 유도형 표현 사용
- 피동형 지양 → 능동형 사용 (예: "처리되었습니다" → "처리했어요")
- 한자어·어려운 어휘 지양 → 쉬운 한국어로 (예: "불이익" → "손해", "요건" → "조건")
- 문장 종결: "~했습니다" 격식체보다 "~했어요" "~해주세요" 권장
- 불필요한 경어 중복 사용 금지

━━━━━━━━━━━━━━━━━━━━━━━━━━━━
[용어 대치 사전] ← 문구 생성·교정 시 자동 적용
━━━━━━━━━━━━━━━━━━━━━━━━━━━━
브랜드/기관명:
- 당행, 본 은행, 당 은행, 대구은행, DGB, 아이엠뱅크 → iM뱅크
- 고객센터, 콜센터, 당행 고객센터 → iM뱅크 고객센터(1566-5050/1588-5050)
- 지점 → 영업점
- 모바일앱뱅킹, 스마트뱅킹, 스마트폰뱅킹 → 모바일뱅킹
- iM뱅크 모바일 앱, iM뱅킹 앱 → iM뱅크 앱

금융 용어:
- 수신 → 예적금
- 여신, 대부 → 대출
- 통장대출 → 마이너스통장
- 차주 → 대출고객
- 요구불 → 입출금 계좌
- 평잔 → 평균잔액
- 적요 → 거래내용
- 시재 → 보유 현금
- 원장잔액 → 계좌잔액
- 잔고 → 수신:총잔액 / 투자:평가금액 / 대출:대출잔액
- 후취보수/선취보수 → 후취수수료/선취수수료
- 리볼빙, 회전결제 → 일부결제이월약정(리볼빙)
- 변제 → 상환
- 불입 → 납입/납부
- 수납 → 납부
- 이율, 이자율 → 이자율
- 거치기간 → 대출:이자만 납부하는 기간 / 예금:납입전 유예기간
- 난수일련번호 → 쿠폰번호
- 표면잔액 → 대출:대출잔액 / 투자:투자원금

일반 용어:
- 클릭하다, 누르다, 터치하다 → 선택하다
- 상세보기, 자세히보기 → 자세히 보기
- 푸시알림, PUSH, push → 앱알림
- 바이오정보, 생체정보 → 생체정보(FACE ID, 지문)
- 핸드폰, 휴대전화 → 휴대폰
- 스마트단말, 단말기, 기기 → 스마트폰 또는 휴대폰
- 어플, 어플리케이션, APP → 앱
- 문자, 메시지, SMS, LMS → 문자메시지
- 보안카드, 씨크리트카드 → 보안카드
- 간편비밀번호, 인증 비밀번호, 퀵인증 비밀번호 → 간편비밀번호
- 받을 계좌 → 받는 계좌
- 가입하다, 개설하다, 만들다 → 상품:가입하기 / 통장:개설하기
- 인증수단, 인증방식 → 인증방법
- ARS 인증, 전화 인증 → 전화 인증
- 통장, 계좌 → 계좌 (상품명 맥락에 따라 수정)
- 승인대기 → 수락대기
- 배송지, 수령지 → 받는 곳
- 서류교부방법 → 서류 받는방법
- 수령하다 → 받다
- 소지하다 → 가지다/있다
- 성명, 성함 → 이름
- 불이익 → 손해
- 진위여부, 진위 → 사실여부
- 상이 → 다름
- 불일치 → 일치하지 않음
- 명칭 → 이름
- 열람 → 조회/확인
- 존재/존재하다 → 있음/있습니다
- 세부 → 자세한
- 상기 → 위
- 서면 → 종이 문서
- 세액 → 세금
- 통지/통보하다 → 알리다/안내하다
- 잔여 → 남은
- 재촬영, 재OO → 다시 촬영, 다시 OO
- 유선 → 전화
- 통상 → 일반적으로
- 요건 → 조건
- 산출 → 계산
- 선행 → 우선
- 전일 → 하루 전
- 익영업일 → 다음 영업일
- 전영업일 → 하루 전(영업일 기준)
- 20영업일 → 20일(영업일 기준)
- 자택 → 집
- 근무처, 회사 → 직장
- 타행 → 다른 은행
- 신규 (단독 사용 금지) → 문장 맥락에 따라 수정
- 미OO → OO하지 않은/되지 않은

표현 교정:
- 알아두세요, 알아두실 사항, 안내사항, 확인사항, 유의사항 → 앱:유의사항 / 메시지:확인해주세요
- 동의/비동의, 동의함/동의하지 않음 → 동의/동의 안함
- 예/아니에요, 네/아니요 → 예/아니요
- CASHBACK → 캐시백
- ON/OFF → 켜기/끄기
- ex, Ex → 예.
- FAX → 팩스
- ID/PW → 아이디/비밀번호
- 되었습니다(피동) → 했습니다(능동)
- 토/일요일·공휴일, 주말 및 휴일 → 토/일/공휴일
- 서비스가 제한됩니다 → 서비스를 이용할 수 없습니다
- 취급이 불가한 상품입니다 → 신청할 수 없는 상품입니다
- 신청해 주세요 → 신청해주세요 (띄어쓰기 없이)
- 상담직원, 권유직원 → 추천직원
- 사업자 번호 → 사업자등록번호
- 주민번호 → 주민등록번호
- 외국인신분증 → 외국인등록증

영어 단독 유지 (한글 변환 금지):

## 컴포넌트

### 바텀시트
- 용도: 현재 화면 흐름 유지하면서 부가 작업
- 조건: 단일 목적, 빠른 입력/선택/확인, 현재 화면 연계 흐름
- 타입: 텍스트형, 입력형, 약관형, 날짜선택형, 선택형, 필터형, 이미지형, 공유형, 암호형, 조합형, 마케팅형
- 텍스트형: 타이틀 최대 16자, 서브타이틀 2줄까지, 버튼 확인/취소
- 입력형: OTP/비밀번호/계좌 입력, 헬퍼텍스트 포함, 닫기 비활성화 가능
- 날짜선택형: 휠픽커(요일 불필요, 기본권장) / 캘린더픽커(요일 필요)
- 약관형: 불릿/단락 구분, 동의/동의 안함 버튼, 필수면 닫기 미제공

### 모달팝업
- 용도: 흐름 중단 후 즉각 반응 유도
- 조건: 중요 경고/안내, 확인/취소 필요, 단일 작업
- 타입: 기본형, 타이틀형, 이미지형, 공지형

### 바텀시트 vs 모달
- 흐름 유지 → 바텀시트
- 흐름 중단 필요 → 모달

## UX Writing 패턴 (공식 가이드)

### 에러 메시지
- 어투: 친절, 해결 방법 중심, 최대 20자
- 금지: 기술 용어, 시스템 코드
- 추천: "다시 시도해주세요" / "비밀번호를 확인해주세요"
- 지양: "에러가 발생했습니다" / "시스템 오류"

### Empty State (빈 화면)
- 어투: 긍정적, 유도적, 2문장 이내
- 추천: "아직 내역이 없어요" / "지금 바로 시작해보세요"
- 지양: "데이터가 없습니다" / "결과 없음"

### 로딩 상태
- 어투: 부드럽고 안정감, 1문장 이내
- 추천: "잠시만 기다려주세요" / "불러오는 중이에요"
- 지양: "로딩 중" / "데이터 처리 중"

### 타이틀 (바텀시트 기준 준용)
- 최대 16자, 문장형, 핵심 정보 앞 배치
- 16자 초과 시 서브타이틀로 분리

### 배너 문구
- 핵심 혜택/수치 첫 줄, CTA와 짝 맞춤, 긍정 어투

### 가입/추천 문구
- 혜택 구체적으로, 즉각성 표현("지금/바로") 활용, 제안형, 2문장 이내

### 버튼(CTA)
- 동사형 6자 이내: "확인하기" "신청하기" "시작하기"
- 금지: "OK" "제출" "클릭"

### 완료 메시지
- 추천: "완료됐어요!" / "이체가 완료됐어요"
- 지양: "처리 완료" / "정상 처리되었습니다"

### 토스트 메시지
- 1문장, 행동 결과 중심
- 추천: "복사됐어요" / "저장됐어요"

const conversationHistory = [];

function scrollToBottom() {
  setTimeout(() => {
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
  }, 60);
}

function addMessage(content, isUser) {
  const area = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.className = `message-row${isUser ? ' user' : ''}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${isUser ? 'user-av' : 'bot'}`;
  avatar.textContent = isUser ? '나' : 'iM';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${isUser ? 'user' : 'bot'}`;
  if (isUser) { bubble.textContent = content; } else { bubble.innerHTML = content; }

  row.appendChild(avatar);
  row.appendChild(bubble);
  area.appendChild(row);
  scrollToBottom();
  return bubble;
}

function addTyping() {
  const area = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.className = 'message-row'; row.id = 'typingRow';
  const avatar = document.createElement('div');
  avatar.className = 'avatar bot'; avatar.textContent = 'iM';
  const ind = document.createElement('div');
  ind.className = 'typing-indicator';
  ind.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  row.appendChild(avatar); row.appendChild(ind);
  area.appendChild(row); scrollToBottom();
}

function removeTyping() { const t = document.getElementById('typingRow'); if (t) t.remove(); }

function parseMarkdown(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h3>$1</h3>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[^<]*<\/li>\n?)+/g, m=>`<ul>${m}</ul>`)
    .replace(/\n\n+/g,'<br><br>')
    .replace(/\n/g,'<br>')
    .replace(/(https?:\/\/[^\s&<>"]+)/g,'<a class="figma-link" href="$1" target="_blank">📐 피그마 가이드 바로 가기 →</a>');
}

async function handleSend() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = ''; input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;

  addMessage(text, true);
  conversationHistory.push({ role: 'user', content: text });
  addTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await res.json();
    const reply = data.content?.map(c => c.text || '').join('') || '답변을 가져오지 못했어요. 다시 시도해주세요.';
    conversationHistory.push({ role: 'assistant', content: reply });

    removeTyping();
    addMessage(parseMarkdown(reply), false);

  } catch (e) {
    removeTyping();
    addMessage('네트워크 오류가 발생했어요. 잠시 후 다시 시도해주세요.', false);
    conversationHistory.pop();
  }

  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
  scrollToBottom();
}

function sendQuick(text) { document.getElementById('userInput').value = text; handleSend(); }

const inp = document.getElementById('userInput');
inp.addEventListener('keydown', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });
inp.addEventListener('input', () => { inp.style.height='auto'; inp.style.height=Math.min(inp.scrollHeight,120)+'px'; });
