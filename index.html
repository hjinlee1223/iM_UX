<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iM뱅크 UX Writing Bot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --im-blue: #005BAC;
    --im-blue-light: #E6F0F9;
    --im-blue-mid: #3D82C4;
    --gray-50: #F8F9FA;
    --gray-100: #F1F3F5;
    --gray-200: #E9ECEF;
    --gray-300: #DEE2E6;
    --gray-500: #ADB5BD;
    --gray-700: #495057;
    --gray-900: #212529;
    --success: #2D9D5F;
    --border: 1px solid #E2E8F0;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(0,91,172,0.08);
  }

  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #F4F7FB;
    color: var(--gray-900);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--im-blue);
    color: white;
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,91,172,0.2);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-badge {
    background: white;
    color: var(--im-blue);
    font-weight: 700;
    font-size: 13px;
    padding: 4px 10px;
    border-radius: 6px;
    letter-spacing: -0.3px;
  }

  header h1 {
    font-size: 16px;
    font-weight: 500;
    opacity: 0.95;
  }

  .header-link {
    background: rgba(255,255,255,0.15);
    color: white;
    text-decoration: none;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.3);
    transition: background 0.2s;
    white-space: nowrap;
  }
  .header-link:hover { background: rgba(255,255,255,0.25); }

  .main-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
    padding: 0;
  }

  .chat-area {
    flex: 1;
    padding: 24px 16px 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: calc(100vh - 56px - 140px);
  }

  .welcome-card {
    background: white;
    border: var(--border);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
  }

  .welcome-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--im-blue);
    margin-bottom: 6px;
  }

  .welcome-desc {
    font-size: 14px;
    color: var(--gray-700);
    line-height: 1.6;
    margin-bottom: 18px;
  }

  .quick-tags-label {
    font-size: 12px;
    color: var(--gray-500);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .quick-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tag {
    background: var(--im-blue-light);
    color: var(--im-blue);
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    border: 1px solid #C8DCF0;
    transition: all 0.15s;
    font-weight: 500;
  }
  .tag:hover {
    background: var(--im-blue);
    color: white;
    border-color: var(--im-blue);
  }

  .message-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .message-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .avatar.bot {
    background: var(--im-blue);
    color: white;
    font-size: 11px;
  }

  .avatar.user-av {
    background: var(--gray-200);
    color: var(--gray-700);
    font-size: 12px;
  }

  .bubble {
    max-width: 86%;
    padding: 14px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.7;
  }

  .bubble.bot {
    background: white;
    border: var(--border);
    box-shadow: var(--shadow);
    color: var(--gray-900);
    border-top-left-radius: 4px;
  }

  .bubble.user {
    background: var(--im-blue);
    color: white;
    border-top-right-radius: 4px;
  }

  .bubble h3 {
    font-size: 13px;
    font-weight: 700;
    color: var(--im-blue);
    margin: 14px 0 6px;
  }
  .bubble.user h3 { color: rgba(255,255,255,0.85); }

  .bubble ul {
    padding-left: 18px;
    margin: 6px 0;
  }
  .bubble ul li { margin-bottom: 4px; }

  .recommend-box {
    background: var(--im-blue-light);
    border: 1px solid #C8DCF0;
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin: 10px 0;
  }

  .recommend-label {
    font-size: 11px;
    color: var(--im-blue);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .recommend-text {
    font-size: 15px;
    font-weight: 700;
    color: var(--gray-900);
  }

  .alt-box {
    background: var(--gray-50);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-top: 6px;
  }

  .alt-label {
    font-size: 11px;
    color: var(--gray-500);
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .alt-text {
    font-size: 14px;
    color: var(--gray-700);
    font-weight: 500;
  }

  .case-section {
    margin-top: 12px;
    border-top: 1px solid var(--gray-200);
    padding-top: 12px;
  }

  .case-section-title {
    font-size: 12px;
    color: var(--gray-500);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .case-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 8px;
    padding: 8px 10px;
    background: var(--gray-50);
    border-radius: var(--radius-sm);
    border: 1px solid var(--gray-200);
  }

  .case-bank {
    font-size: 11px;
    font-weight: 700;
    color: white;
    background: var(--gray-500);
    padding: 2px 7px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .case-content {
    font-size: 13px;
    color: var(--gray-700);
    line-height: 1.5;
  }

  .figma-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--im-blue);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    background: var(--im-blue-light);
    border-radius: var(--radius-sm);
    border: 1px solid #C8DCF0;
    margin-top: 10px;
    transition: all 0.15s;
  }
  .figma-link:hover { background: var(--im-blue); color: white; }

  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 14px 16px;
    background: white;
    border: var(--border);
    border-radius: var(--radius);
    border-top-left-radius: 4px;
    width: fit-content;
    box-shadow: var(--shadow);
  }

  .dot {
    width: 7px;
    height: 7px;
    background: var(--gray-300);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); background: var(--gray-300); }
    30% { transform: translateY(-6px); background: var(--im-blue); }
  }

  .input-area {
    position: sticky;
    bottom: 0;
    background: #F4F7FB;
    padding: 12px 16px 20px;
    border-top: var(--border);
  }

  .input-wrap {
    display: flex;
    gap: 10px;
    background: white;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 10px 14px;
    transition: border-color 0.2s;
    box-shadow: var(--shadow);
  }

  .input-wrap:focus-within {
    border-color: var(--im-blue);
    box-shadow: 0 0 0 3px rgba(0,91,172,0.1);
  }

  #userInput {
    flex: 1;
    border: none;
    outline: none;
    font-size: 14px;
    color: var(--gray-900);
    background: transparent;
    font-family: inherit;
    resize: none;
    min-height: 20px;
    max-height: 120px;
    line-height: 1.5;
  }

  #userInput::placeholder { color: var(--gray-500); }

  .send-btn {
    background: var(--im-blue);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    width: 36px;
    height: 36px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    align-self: flex-end;
    transition: background 0.15s;
  }
  .send-btn:hover { background: #004A91; }
  .send-btn:disabled { background: var(--gray-300); cursor: not-allowed; }

  .send-btn svg { width: 16px; height: 16px; }

  .hint-text {
    text-align: center;
    font-size: 11px;
    color: var(--gray-500);
    margin-top: 8px;
  }

  .badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .badge.blue { background: var(--im-blue-light); color: var(--im-blue); }
  .badge.green { background: #E8F5EE; color: #1A7A42; }
  .badge.gray { background: var(--gray-100); color: var(--gray-700); }

  @media (max-width: 480px) {
    .bubble { max-width: 92%; }
    header h1 { font-size: 14px; }
    .header-link { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-badge">iM뱅크</div>
    <h1>UX Writing Bot</h1>
  </div>
  <a class="header-link" href="https://www.figma.com/design/XJTKvH2kJQg0cuf4Gg8DRI/UI-Guide?node-id=176-14178&t=Kgl4nVum9LJWVH5c-1" target="_blank">
    📐 가이드 문서 열기
  </a>
</header>

<div class="main-container">
  <div class="chat-area" id="chatArea">
    <div class="welcome-card">
      <div class="welcome-title">안녕하세요! iM뱅크 UX Writing Bot이에요 👋</div>
      <div class="welcome-desc">
        iM뱅크 UX Writing 가이드 기준에 따라 UI 문구, 컴포넌트 추천, 에러 메시지 등을 도와드립니다.<br>
        질문이 짧거나 모호해도 괜찮아요. 함께 정리해 드릴게요.
      </div>
      <div class="quick-tags-label">자주 묻는 질문으로 시작해보세요</div>
      <div class="quick-tags">
        <div class="tag" onclick="sendQuick('에러 메시지 문구를 만들고 싶어요')">에러 메시지 작성</div>
        <div class="tag" onclick="sendQuick('바텀시트와 모달팝업 중 뭘 써야 할까요?')">바텀시트 vs 모달</div>
        <div class="tag" onclick="sendQuick('빈 화면(empty state) 문구가 필요해요')">Empty State 문구</div>
        <div class="tag" onclick="sendQuick('로딩 중 메시지는 어떻게 쓰나요?')">로딩 문구</div>
        <div class="tag" onclick="sendQuick('약관 동의 바텀시트 가이드가 궁금해요')">약관형 가이드</div>
        <div class="tag" onclick="sendQuick('UX Writing Guide 문서 링크를 알려줘')">가이드 문서 링크</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="userInput" placeholder="UI 문구, 컴포넌트, 상황을 자유롭게 입력해주세요..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="handleSend()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="hint-text">iM뱅크 UX 가이드 기반으로 답변합니다 · 가이드에 없는 내용은 없다고 안내드려요</div>
  </div>
</div>

<script>
const GUIDE_DATA = {
  figma_url: "https://www.figma.com/design/XJTKvH2kJQg0cuf4Gg8DRI/UI-Guide?node-id=176-14178&t=Kgl4nVum9LJWVH5c-1",
  
  patterns: {
    error_message: {
      tone: "명확하고 친절한 어투, 원인보다는 해결 방법 중심",
      length: "최대 20자 이내",
      avoid: ["기술 용어", "시스템 내부 코드"],
      tip: "사용자가 무엇을 해야 하는지 알 수 있게 표현",
      good: ["다시 시도해주세요", "비밀번호를 확인해주세요"],
      bad: ["에러가 발생했습니다", "시스템 오류"]
    },
    empty_state: {
      tone: "긍정적이고 유도적인 어투",
      length: "두 문장 이내, 간결한 메시지",
      tip: "무엇을 할 수 있는지 행동을 제시하면 좋음",
      good: ["아직 내역이 없어요", "지금 바로 시작해보세요"],
      bad: ["데이터가 없습니다", "결과 없음"]
    },
    loading_state: {
      tone: "부드럽고 안정감을 주는 표현",
      length: "최대 한 문장",
      tip: "사용자의 불안감을 줄이고, 기다림의 의미를 알려줌",
      good: ["잠시만 기다려주세요", "불러오는 중이에요"],
      bad: ["로딩 중", "데이터 처리 중"]
    }
  },

  bottom_sheet: {
    description: "화면 하단에서 슬라이드 형태로 나타나는 UI로, 사용자의 추가 작업(정보 확인/선택/입력 등)을 지원",
    use_when: ["단일 목적성 태스크", "빠른 입력/선택/확인 필요", "현재 화면과 연계된 흐름 유지"],
    types: {
      텍스트형: { title: "최대 16자, 문장형 가능", subtitle: "필요시 2줄까지 제공", button: "확인/취소 CTA 제공", close: "닫기 버튼 포함 권장" },
      입력형: { title: "명확한 지시 포함", helper_text: "입력 유도형 문장 사용", input: "플레이스홀더, 헬퍼텍스트 포함 가능", close: "프로세스 완료 전 닫기 비활성화 가능" },
      날짜선택형: { title: "16자 이내 문장형", button: "확인/취소", close: "닫기 버튼 포함, dim 영역 탭 시 닫힘" },
      약관형: { content: "불릿 또는 단락 구분 가능", button: "동의/비동의 버튼", close: "강제성 있는 경우 닫기 미제공" }
    }
  },

  modal_popup: {
    description: "중요 알림, 결정 유도 등 흐름을 멈추고 즉각적인 반응을 유도하는 UI",
    use_when: ["중요한 안내 또는 경고", "확인/취소 등 즉각 반응 필요", "화면 흐름 중단 후 단일 작업"],
    types: ["기본형", "타이틀형", "이미지형", "공지형"]
  }
};

const CASES = {
  error_message: [
    { bank: "카카오뱅크", text: "잠깐! 확인이 필요해요 + 구체적 안내 문구로 친근한 어투 유지" },
    { bank: "토스", text: "'다시 시도해 주세요' 외 원인을 한 줄로 간결하게 병기" },
    { bank: "KB국민은행", text: "오류 코드 대신 상황별 해결 행동을 명확히 제시" }
  ],
  empty_state: [
    { bank: "카카오뱅크", text: "일러스트 + '아직 없어요' 형태의 구어체 + CTA 버튼 조합" },
    { bank: "토스", text: "감성적 문구('아직 내역이 없어요')와 행동 유도 버튼을 함께 배치" },
    { bank: "신한SOL", text: "상황별 Empty State 세분화, 조회 실패와 데이터 없음을 분리 안내" }
  ],
  loading_state: [
    { bank: "카카오뱅크", text: "스켈레톤 UI + '잠깐, 불러오고 있어요' 조합으로 대기 불안 감소" },
    { bank: "토스", text: "애니메이션 + 짧고 따뜻한 문구('잠시만요') 활용" },
    { bank: "KB국민은행", text: "로딩 바 + '처리 중입니다' 수준이나 최근 친근한 어투로 개선 추세" }
  ],
  bottom_sheet: [
    { bank: "카카오뱅크", text: "dim 처리 + 드래그 핸들 제공, 단일 목적 액션에 집중" },
    { bank: "토스", text: "바텀시트 내 스크롤 허용, 복잡한 선택지도 바텀시트 안에 처리" },
    { bank: "신한SOL", text: "약관형은 별도 전체화면 전환 대신 바텀시트 내 긴 스크롤로 처리" }
  ],
  modal: [
    { bank: "카카오뱅크", text: "중요 경고에만 모달 사용, 일반 안내는 바텀시트로 분리" },
    { bank: "토스", text: "모달은 최소화, 대신 인라인 피드백 강화 정책 적용" },
    { bank: "KB국민은행", text: "보안/금융거래 확인에 모달 집중 사용, 2버튼 구조 일관성 유지" }
  ]
};

function analyzeIntent(text) {
  const t = text.toLowerCase();
  if (t.includes('피그마') || t.includes('figma') || t.includes('가이드 문서') || t.includes('링크')) return 'figma_link';
  if (t.includes('에러') || t.includes('오류') || t.includes('실패') || t.includes('error')) return 'error_message';
  if (t.includes('빈 화면') || t.includes('empty') || t.includes('결과 없') || t.includes('내역 없')) return 'empty_state';
  if (t.includes('로딩') || t.includes('불러오') || t.includes('loading') || t.includes('기다')) return 'loading_state';
  if (t.includes('바텀시트') && t.includes('모달')) return 'compare_bs_modal';
  if (t.includes('바텀시트') || t.includes('bottom sheet') || t.includes('bottom_sheet')) return 'bottom_sheet';
  if (t.includes('모달') || t.includes('팝업') || t.includes('modal')) return 'modal';
  if (t.includes('약관') || t.includes('동의') || t.includes('개인정보')) return 'terms_sheet';
  if (t.includes('날짜') || t.includes('date') || t.includes('달력') || t.includes('캘린더')) return 'date_sheet';
  if (t.includes('입력') || t.includes('otp') || t.includes('비밀번호')) return 'input_sheet';
  if (t.includes('문구') || t.includes('카피') || t.includes('텍스트') || t.includes('써')) return 'writing_help';
  return 'unknown';
}

function addMessage(content, isUser) {
  const area = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.className = `message-row${isUser ? ' user' : ''}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${isUser ? 'user-av' : 'bot'}`;
  avatar.textContent = isUser ? '나' : 'iM';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${isUser ? 'user' : 'bot'}`;

  if (isUser) {
    bubble.textContent = content;
  } else {
    bubble.innerHTML = content;
  }

  row.appendChild(avatar);
  row.appendChild(bubble);
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
  return row;
}

function addTyping() {
  const area = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.className = 'message-row';
  row.id = 'typingRow';

  const avatar = document.createElement('div');
  avatar.className = 'avatar bot';
  avatar.textContent = 'iM';

  const indicator = document.createElement('div');
  indicator.className = 'typing-indicator';
  indicator.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

  row.appendChild(avatar);
  row.appendChild(indicator);
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingRow');
  if (t) t.remove();
}

function handleSend() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;

  addMessage(text, true);
  addTyping();

  setTimeout(() => {
    removeTyping();
    const intent = analyzeIntent(text);
    const response = generateResponse(intent, text);
    addMessage(response, false);
    document.getElementById('sendBtn').disabled = false;
  }, 900 + Math.random() * 400);
}

function sendQuick(text) {
  document.getElementById('userInput').value = text;
  handleSend();
}

const input = document.getElementById('userInput');
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});
</script>
